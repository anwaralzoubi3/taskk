<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Functions</title>
</head>
<body>

<script>
  // 1) tellFortune
  function tellFortune(jobTitle, location, partnerName, numChildren) {
    console.log(`You will be a ${jobTitle} in ${location}, and married to ${partnerName} with ${numChildren} kids.`);
  }

  // 2) calculateDogAge
  function calculateDogAge(puppyAge) {
    let dogAge = puppyAge * 7;
    console.log(`Your doggie is ${dogAge} years old in dog years!`);
  }

  // 3) calculateSupply
  function calculateSupply(age, amountPerDay) {
    let maxAge = 100;
    let remainingYears = maxAge - age;
    let totalNeeded = remainingYears * 365 * amountPerDay;

    console.log(`You will need ${totalNeeded} to last you until the ripe old age of ${maxAge}`);
  }

  // 4) fixed double
  function double(x) {
    return 2 * x;
  }

  // 5) fixed functions
  function double1(x) {
    return 2 * x;
  }

  function double2(x) {
    return 2 * x;
  }

  function double3(x) {
    return 2 * x;
  }

  // 6) canIGetADrivingLicense
  function canIGetADrivingLicense(age) {
    if (age >= 20) {
      return "yes you can";
    } else {
      let yearsLeft = 20 - age;
      return `please come back after ${yearsLeft} years to get one`;
    }
  }

  // 7) sameLength
  function sameLength(str1, str2) {
    return str1.length === str2.length;
  }

  // 8) average
  function average(a, b, c, d, e) {
    return (a + b + c + d + e) / 5;
  }

  // 9) randomNumber
  function randomNumber() {
    return Math.random();
  }

  // 10) randomBetweenNumbers
  function randomBetweenNumbers(min, max) {
    return Math.random() * (max - min) + min;
  }

  // ===== TEST =====
  tellFortune('software engineer', 'Jordan', 'Alice', 3);

  calculateDogAge(1);

  calculateSupply(30, 3);

  console.log(double(5));

  console.log(double1(4));
  console.log(double2(6));
  console.log(double3(8));

  console.log(canIGetADrivingLicense(21));
  console.log(canIGetADrivingLicense(17));
  console.log(canIGetADrivingLicense(20));

  console.log(sameLength("tree", "clue"));
  console.log(sameLength("tree", "car"));

  console.log(average(1,2,3,4,5));
  console.log(average(5,7,9,3,5));

  console.log(randomNumber());

  console.log(randomBetweenNumbers(1, 8));
  console.log(randomBetweenNumbers(3, 100));

</script>

</body>
</html>
